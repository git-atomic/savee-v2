[build]
  # Build the Next.js web app
  base = "apps/web"
  command = "npm install && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Next.js configuration - Netlify will auto-detect Next.js
# The @netlify/plugin-nextjs is automatically installed

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Disable all caching for API routes to prevent edge-cached duplicates
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "private, no-cache, no-store, must-revalidate, max-age=0"
    Pragma = "no-cache"
    Expires = "0"
    CDN-Cache-Control = "no-store"
    Netlify-CDN-Cache-Control = "no-store"

# Environment variables (set these in Netlify dashboard)
# DATABASE_URL - Your database connection string
# CMS_URL - Your CMS API URL (e.g., https://flowcms.netlify.app)
# NEXT_PUBLIC_CMS_URL - Public CMS URL for client-side calls (e.g., https://flowcms.netlify.app)
