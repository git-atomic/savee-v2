name: Engine Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      sourceId:
        description: "Optional sourceId to run immediately"
        required: false
        default: ""
      backfill:
        description: "Run monitor with ?backfill=true"
        required: false
        default: "false"
  repository_dispatch:
    types: [run_monitor]

jobs:
  monitor:
    runs-on: ubuntu-22.04
    concurrency:
      group: engine-monitor
      cancel-in-progress: false
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show worker commit
        run: |
          echo "Workflow commit: $GITHUB_SHA"
          git rev-parse --short HEAD

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/worker/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/worker/requirements.txt') }}-v1
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install worker deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/worker/requirements.txt

      - name: Install Playwright (with system deps)
        run: |
          python -m playwright install --with-deps chromium

      - name: Prepare cookies file (optional)
        env:
          COOKIES_JSON: ${{ secrets.COOKIES_JSON || secrets.SAVEE_COOKIES_JSON || vars.COOKIES_JSON || vars.SAVEE_COOKIES_JSON }}
          COOKIES_JSON_B64: ${{ secrets.COOKIES_JSON_B64 || vars.COOKIES_JSON_B64 }}
        run: |
          if [ -n "$COOKIES_JSON" ]; then
            echo "Writing cookies from COOKIES_JSON"
            printf "%s" "$COOKIES_JSON" > apps/worker/savee_cookies.json || true
          elif [ -n "$COOKIES_JSON_B64" ]; then
            echo "Writing cookies from COOKIES_JSON_B64"
            printf "%s" "$COOKIES_JSON_B64" | base64 -d > apps/worker/savee_cookies.json || true
          else
            echo "No COOKIES_JSON secret set; relying on COOKIES_PATH if provided."
          fi

      - name: Validate auth cookies
        env:
          COOKIES_JSON: ${{ secrets.COOKIES_JSON || secrets.SAVEE_COOKIES_JSON || vars.COOKIES_JSON || vars.SAVEE_COOKIES_JSON }}
          COOKIES_JSON_B64: ${{ secrets.COOKIES_JSON_B64 || vars.COOKIES_JSON_B64 }}
          COOKIES_PATH: ${{ secrets.COOKIES_PATH || vars.COOKIES_PATH }}
        run: |
          python apps/worker/scripts/cookie_health.py --strict

      - name: Call /api/engine/monitor (external-runner mode)
        env:
          CMS_URL: ${{ secrets.CMS_URL || vars.CMS_URL }}
          MONITOR_URL: ${{ secrets.MONITOR_URL || vars.MONITOR_URL }}
          ENGINE_MONITOR_TOKEN: ${{ secrets.ENGINE_MONITOR_TOKEN || vars.ENGINE_MONITOR_TOKEN }}
          BACKFILL: ${{ github.event.inputs.backfill }}
          SOURCE_ID: ${{ github.event.inputs.sourceId || github.event.client_payload.sourceId }}
          SEED_URL: ${{ secrets.SEED_URL || vars.SEED_URL }}
        run: |
          # Normalize provided URLs to avoid trailing /admin, /api, or / paths
          norm() { echo "$1" | sed -E 's#/+$##' | sed -E 's#/admin$##' | sed -E 's#/api$##'; }
          CMS_BASE=$(norm "$CMS_URL")
          MON_BASE=$(norm "$MONITOR_URL")

          # Derive monitor URL
          URL=""
          if [ -n "$MON_BASE" ]; then
            case "$MON_BASE" in
              */api/engine/monitor*) URL="$MON_BASE" ;;
              *) URL="${MON_BASE%/}/api/engine/monitor" ;;
            esac
          elif [ -n "$CMS_BASE" ]; then
            URL="${CMS_BASE%/}/api/engine/monitor"
          fi

          if [ -z "$URL" ]; then echo "Provide MONITOR_URL or CMS_URL secret"; exit 1; fi
          # Ensure worker step always has a response file to parse
          echo '{"startedDetails":[]}' > /tmp/resp.json
          # Seed a source if requested and none exist yet
          if [ -n "$SEED_URL" ] && [ -n "$CMS_URL" ]; then
            echo "Ensuring at least one source via /api/engine/run";
            curl --retry 5 --retry-all-errors --retry-delay 3 --max-time 45 -sS -X POST "${CMS_BASE%/}/api/engine/run?mode=external" \
              -H 'Content-Type: application/json' \
              --data "{\"url\":\"$SEED_URL\",\"maxItems\":0}" || true
          fi
          if [ "$BACKFILL" = "true" ]; then
            if echo "$URL" | grep -q "?"; then URL="$URL&backfill=true"; else URL="$URL?backfill=true"; fi
          fi
          # Optional: target a single sourceId from repository_dispatch payload
          if [ -n "$SOURCE_ID" ]; then
            if echo "$URL" | grep -q "?"; then URL="$URL&sourceId=$SOURCE_ID"; else URL="$URL?sourceId=$SOURCE_ID"; fi
          fi
          # Force external-runner mode
          if echo "$URL" | grep -q "?"; then URL="$URL&mode=external"; else URL="$URL?mode=external"; fi
          echo "POST $URL"
          set +e
          http_code=$(curl --retry 5 --retry-all-errors --retry-delay 5 --retry-max-time 240 --max-time 180 --connect-timeout 30 -sS -o /tmp/resp.json -w "%{http_code}" -H "Authorization: Bearer $ENGINE_MONITOR_TOKEN" -X POST "$URL")
          curl_exit=$?
          set -e
          echo "Response ($http_code):" && cat /tmp/resp.json || true
          if [ $curl_exit -ne 0 ]; then
            echo "Monitor call timed out/failed (curl exit $curl_exit). Continuing with /api/engine/pending fallback."
            [ -s /tmp/resp.json ] || echo '{"startedDetails":[]}' > /tmp/resp.json
          elif [ "$http_code" -ge 300 ]; then
            if [ "$http_code" = "401" ] || [ "$http_code" = "403" ]; then
              echo "Monitor auth failed (HTTP $http_code). Check ENGINE_MONITOR_TOKEN."; exit 1;
            fi
            echo "Monitor returned HTTP $http_code; continuing with /api/engine/pending fallback."
            [ -s /tmp/resp.json ] || echo '{"startedDetails":[]}' > /tmp/resp.json
          fi

      - name: Run pending runs (Python worker)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          DB_SCHEMA: ${{ secrets.DB_SCHEMA || vars.DB_SCHEMA || 'cms' }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL || vars.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || vars.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || vars.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || vars.R2_BUCKET_NAME }}
          R2_REGION: auto
          SECONDARY_DATABASE_URL: ${{ secrets.SECONDARY_DATABASE_URL || vars.SECONDARY_DATABASE_URL }}
          SECONDARY_R2_ENDPOINT_URL: ${{ secrets.SECONDARY_R2_ENDPOINT_URL || vars.SECONDARY_R2_ENDPOINT_URL }}
          SECONDARY_R2_ACCESS_KEY_ID: ${{ secrets.SECONDARY_R2_ACCESS_KEY_ID || vars.SECONDARY_R2_ACCESS_KEY_ID }}
          SECONDARY_R2_SECRET_ACCESS_KEY: ${{ secrets.SECONDARY_R2_SECRET_ACCESS_KEY || vars.SECONDARY_R2_SECRET_ACCESS_KEY }}
          SECONDARY_R2_BUCKET_NAME: ${{ secrets.SECONDARY_R2_BUCKET_NAME || vars.SECONDARY_R2_BUCKET_NAME }}
          SECONDARY_R2_REGION: ${{ secrets.SECONDARY_R2_REGION || vars.SECONDARY_R2_REGION || 'auto' }}
          SECRET_KEY: ${{ secrets.SECRET_KEY || vars.SECRET_KEY }}
          COOKIES_JSON: ${{ secrets.COOKIES_JSON || secrets.SAVEE_COOKIES_JSON || vars.COOKIES_JSON || vars.SAVEE_COOKIES_JSON }}
          COOKIES_JSON_B64: ${{ secrets.COOKIES_JSON_B64 || vars.COOKIES_JSON_B64 }}
          COOKIES_PATH: ${{ secrets.COOKIES_PATH || vars.COOKIES_PATH }}
          JOB_CONCURRENCY: ${{ secrets.JOB_CONCURRENCY || vars.JOB_CONCURRENCY || '1' }}
          ITEM_CONCURRENCY: ${{ secrets.ITEM_CONCURRENCY || vars.ITEM_CONCURRENCY || '2' }}
          CMS_URL: ${{ secrets.CMS_URL || vars.CMS_URL }}
          ENGINE_MONITOR_TOKEN: ${{ secrets.ENGINE_MONITOR_TOKEN || vars.ENGINE_MONITOR_TOKEN }}
          WORKER_PARALLELISM: ${{ secrets.WORKER_PARALLELISM || vars.WORKER_PARALLELISM || '2' }}
          WORKER_MAX_ATTEMPTS: ${{ secrets.WORKER_MAX_ATTEMPTS || vars.WORKER_MAX_ATTEMPTS || '3' }}
          PENDING_FETCH_LIMIT: ${{ secrets.PENDING_FETCH_LIMIT || vars.PENDING_FETCH_LIMIT || '12' }}
          RESOLVE_SOURCE_URLS: ${{ secrets.RESOLVE_SOURCE_URLS || vars.RESOLVE_SOURCE_URLS || 'false' }}
          STOP_ON_FIRST_OLD: ${{ secrets.STOP_ON_FIRST_OLD || vars.STOP_ON_FIRST_OLD || 'true' }}
          MIN_NEW_BEFORE_BREAK: ${{ secrets.MIN_NEW_BEFORE_BREAK || vars.MIN_NEW_BEFORE_BREAK || '1' }}
          ONLY_OLD_EXIT_STREAK: ${{ secrets.ONLY_OLD_EXIT_STREAK || vars.ONLY_OLD_EXIT_STREAK || '8' }}
          PROBE_MIN_ITEMS: ${{ secrets.PROBE_MIN_ITEMS || vars.PROBE_MIN_ITEMS || '48' }}
          CAPACITY_CHECK_EVERY: ${{ secrets.CAPACITY_CHECK_EVERY || vars.CAPACITY_CHECK_EVERY || '25' }}
          CAPACITY_CHECK_INTERVAL_SEC: ${{ secrets.CAPACITY_CHECK_INTERVAL_SEC || vars.CAPACITY_CHECK_INTERVAL_SEC || '60' }}
          SAVEESCRAPER_SCROLL_STEPS: ${{ secrets.SAVEESCRAPER_SCROLL_STEPS || vars.SAVEESCRAPER_SCROLL_STEPS }}
          SAVEESCRAPER_SCROLL_WAIT_MS: ${{ secrets.SAVEESCRAPER_SCROLL_WAIT_MS || vars.SAVEESCRAPER_SCROLL_WAIT_MS }}
          SAVEESCRAPER_IDLE_ROUNDS: ${{ secrets.SAVEESCRAPER_IDLE_ROUNDS || vars.SAVEESCRAPER_IDLE_ROUNDS }}
        run: |
          cd apps/worker
          python scripts/run_pending_once.py

      - name: Notify Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            msg=":rotating_light: Monitor failed for $GITHUB_REPOSITORY@$GITHUB_REF — run $GITHUB_RUN_ID"
            payload=$(printf '{"text":"%s"}' "$msg")
            curl -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" || true
          else
            echo "SLACK_WEBHOOK_URL not set; skipping Slack notification"
          fi
