name: Run Database Migrations

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - apps/worker/alembic/versions/**
      - .github/workflows/migrate.yml

jobs:
  migrate:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/worker/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/worker/requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: apps/worker
        run: |
          alembic upgrade head

      - name: Verify migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          import os
          from sqlalchemy import create_engine, text
          engine = create_engine(os.environ['DATABASE_URL'])
          with engine.connect() as conn:
            result = conn.execute(text(\"SELECT COUNT(*) FROM information_schema.tables WHERE table_name = 'job_logs'\"))
            count = result.scalar()
            if count == 0:
              print('ERROR: job_logs table not found')
              exit(1)
            print('✓ job_logs table exists')
          "
