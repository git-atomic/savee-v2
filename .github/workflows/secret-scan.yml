name: Secret Scan (gitleaks)

on:
  # Completely disabled to avoid GitHub Actions billing issues
  # This is a non-essential check - you can run gitleaks locally if needed
  # push:
  #   branches: [main]
  workflow_dispatch:  # Only allow manual runs if needed

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        continue-on-error: true
        uses: zricethezav/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE || '' }}
        with:
          args: "detect --report-format sarif --report-path gitleaks.sarif --redact"
      - name: Upload SARIF report
        if: failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
