name: ScrapeSavee Worker

on:
  # Run on schedule (DISABLED - free tier exhausted, will re-enable after reset)
  # schedule:
  #   - cron: '0 */6 * * *'  # Every 6 hours (4 times/day) - optimized for free tier
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source ID to process'
        required: true
        type: string
  # Push trigger disabled to keep free-tier usage minimal.

jobs:
  worker:
    runs-on: ubuntu-latest
    concurrency:
      group: worker-manual
      cancel-in-progress: false
    timeout-minutes: 60  # Timeout after 1 hour
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: apps/worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare cookies file (optional)
        env:
          COOKIES_JSON: ${{ secrets.COOKIES_JSON || secrets.SAVEE_COOKIES_JSON || vars.COOKIES_JSON || vars.SAVEE_COOKIES_JSON }}
          COOKIES_JSON_B64: ${{ secrets.COOKIES_JSON_B64 || vars.COOKIES_JSON_B64 }}
        run: |
          if [ -n "$COOKIES_JSON" ]; then
            printf "%s" "$COOKIES_JSON" > apps/worker/savee_cookies.json || true
          elif [ -n "$COOKIES_JSON_B64" ]; then
            printf "%s" "$COOKIES_JSON_B64" | base64 -d > apps/worker/savee_cookies.json || true
          fi

      - name: Validate auth cookies
        env:
          COOKIES_JSON: ${{ secrets.COOKIES_JSON || secrets.SAVEE_COOKIES_JSON || vars.COOKIES_JSON || vars.SAVEE_COOKIES_JSON }}
          COOKIES_JSON_B64: ${{ secrets.COOKIES_JSON_B64 || vars.COOKIES_JSON_B64 }}
          COOKIES_PATH: ${{ secrets.COOKIES_PATH || vars.COOKIES_PATH }}
        run: |
          python apps/worker/scripts/cookie_health.py --strict

      - name: Run worker
        working-directory: apps/worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL || vars.DATABASE_URL }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL || vars.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME || vars.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID || vars.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY || vars.R2_SECRET_ACCESS_KEY }}
          COOKIES_JSON: ${{ secrets.COOKIES_JSON || secrets.SAVEE_COOKIES_JSON || vars.COOKIES_JSON || vars.SAVEE_COOKIES_JSON }}
          COOKIES_JSON_B64: ${{ secrets.COOKIES_JSON_B64 || vars.COOKIES_JSON_B64 }}
          COOKIES_PATH: ./savee_cookies.json
          JOB_CONCURRENCY: ${{ secrets.JOB_CONCURRENCY || vars.JOB_CONCURRENCY || '1' }}
          ITEM_CONCURRENCY: ${{ secrets.ITEM_CONCURRENCY || vars.ITEM_CONCURRENCY || '2' }}
          WORKER_PARALLELISM: ${{ secrets.WORKER_PARALLELISM || vars.WORKER_PARALLELISM || '2' }}
          WORKER_MAX_ATTEMPTS: ${{ secrets.WORKER_MAX_ATTEMPTS || vars.WORKER_MAX_ATTEMPTS || '3' }}
          RESOLVE_SOURCE_URLS: "false"
        continue-on-error: true
        run: |
          # For manual trigger, use provided source_id
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            python -m app.cli run --source-id ${{ github.event.inputs.source_id }}
          else
            # For scheduled runs, try source ID 1, but don't fail if it doesn't exist
            python -m app.cli run --source-id 1 || echo "Source ID 1 not found or error occurred, skipping..."
          fi

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: worker-logs
          path: apps/worker/*.log
          retention-days: 7
