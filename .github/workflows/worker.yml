name: ScrapeSavee Worker

on:
  # Run on schedule (DISABLED - free tier exhausted, will re-enable after reset)
  # schedule:
  #   - cron: '0 */6 * * *'  # Every 6 hours (4 times/day) - optimized for free tier
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source ID to process'
        required: true
        type: string
  # Run on push to main only (skip on feature branches to avoid PR failures)
  push:
    branches:
      - main
    paths:
      - 'apps/worker/**'
      - '.github/workflows/worker.yml'

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Timeout after 1 hour
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: apps/worker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run worker
        working-directory: apps/worker
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          COOKIES_PATH: ./savee_cookies.json
        continue-on-error: true
        run: |
          # For manual trigger, use provided source_id
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            python -m app.cli run --source-id ${{ github.event.inputs.source_id }}
          else
            # For scheduled runs, try source ID 1, but don't fail if it doesn't exist
            python -m app.cli run --source-id 1 || echo "Source ID 1 not found or error occurred, skipping..."
          fi

      - name: Upload logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: worker-logs
          path: apps/worker/*.log
          retention-days: 7
