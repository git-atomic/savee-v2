name: Engine Monitor (Manual)

on:
  workflow_dispatch:
    inputs:
      sourceId:
        description: "Optional sourceId to run immediately"
        required: false
        default: ""
      backfill:
        description: "Run monitor with ?backfill=true"
        required: false
        default: "false"

jobs:
  monitor:
    runs-on: ubuntu-22.04
    concurrency:
      group: engine-monitor
      cancel-in-progress: false
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/worker/requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/worker/requirements.txt') }}-v1
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install worker deps
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/worker/requirements.txt

      - name: Install Playwright (with system deps)
        run: |
          python -m playwright install --with-deps chromium

      - name: Prepare cookies file (optional)
        env:
          COOKIES_JSON: ${{ secrets.COOKIES_JSON }}
        run: |
          if [ -n "$COOKIES_JSON" ]; then
            printf "%s" "$COOKIES_JSON" > apps/worker/savee_cookies.json || true
            # Skip strict validation; worker tolerates missing/invalid cookies
          fi

      - name: Call /api/engine/monitor (manual trigger)
        env:
          CMS_URL: ${{ secrets.CMS_URL }}
          MONITOR_URL: ${{ secrets.MONITOR_URL }}
          ENGINE_MONITOR_TOKEN: ${{ secrets.ENGINE_MONITOR_TOKEN }}
        run: |
          norm() { echo "$1" | sed -E 's#/+$##' | sed -E 's#/admin$##' | sed -E 's#/api$##'; }
          CMS_BASE=$(norm "$CMS_URL")
          MON_BASE=$(norm "$MONITOR_URL")
          URL=""
          if [ -n "$MON_BASE" ]; then
            case "$MON_BASE" in
              */api/engine/monitor*) URL="$MON_BASE" ;;
              *) URL="${MON_BASE%/}/api/engine/monitor" ;;
            esac
          elif [ -n "$CMS_BASE" ]; then
            URL="${CMS_BASE%/}/api/engine/monitor"
          fi
          [ -z "$URL" ] && { echo "MONITOR_URL or CMS_URL required"; exit 1; }
          echo '{"startedDetails":[]}' > /tmp/resp.json
          SID="${{ github.event.inputs.sourceId }}"; BF="${{ github.event.inputs.backfill }}"
          if [ "$BF" = "true" ]; then
            if echo "$URL" | grep -q "?"; then URL="$URL&backfill=true"; else URL="$URL?backfill=true"; fi
          fi
          if [ -n "$SID" ]; then
            if echo "$URL" | grep -q "?"; then URL="$URL&sourceId=$SID"; else URL="$URL?sourceId=$SID"; fi
          fi
          if echo "$URL" | grep -q "?"; then URL="$URL&mode=external"; else URL="$URL?mode=external"; fi
          echo "POST $URL"
          set +e
          http_code=$(curl --retry 5 --retry-all-errors --retry-delay 5 --retry-max-time 180 --max-time 90 --connect-timeout 15 -sS -o /tmp/resp.json -w "%{http_code}" -H "Authorization: Bearer $ENGINE_MONITOR_TOKEN" -X POST "$URL")
          curl_exit=$?
          set -e
          echo "Response ($http_code):" && cat /tmp/resp.json || true
          if [ $curl_exit -ne 0 ]; then
            echo "Monitor call timed out/failed (curl exit $curl_exit). Continuing with /api/engine/pending fallback."
            [ -s /tmp/resp.json ] || echo '{"startedDetails":[]}' > /tmp/resp.json
          elif [ "$http_code" -ge 300 ]; then
            if [ "$http_code" = "401" ] || [ "$http_code" = "403" ]; then
              echo "Monitor auth failed (HTTP $http_code). Check ENGINE_MONITOR_TOKEN."; exit 1;
            fi
            echo "Monitor returned HTTP $http_code; continuing with /api/engine/pending fallback."
            [ -s /tmp/resp.json ] || echo '{"startedDetails":[]}' > /tmp/resp.json
          fi

      - name: Run pending runs (Python worker)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_REGION: auto
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          COOKIES_JSON: ${{ secrets.COOKIES_JSON }}
          COOKIES_PATH: ${{ secrets.COOKIES_PATH }}
          JOB_CONCURRENCY: ${{ secrets.JOB_CONCURRENCY }}
          ITEM_CONCURRENCY: ${{ secrets.ITEM_CONCURRENCY }}
          CMS_URL: ${{ secrets.CMS_URL }}
          ENGINE_MONITOR_TOKEN: ${{ secrets.ENGINE_MONITOR_TOKEN }}
          WORKER_PARALLELISM: ${{ secrets.WORKER_PARALLELISM }}
        run: |
          cd apps/worker
          python scripts/run_pending_once.py
